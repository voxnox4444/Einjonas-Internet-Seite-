<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
  color: white;
  text-align: center;
}

/* Header Bild */
.bild1 {
  width: 100%;
  max-height: 400px;
  object-fit: cover;

}

/* Haupttext Box */
#vorwort {
  width: 80%;

  margin: 30px auto;
  padding: 20px;

  border-radius: 15px;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 20px rgba(0,255,204,0.2);
}

/* Buttons */
button {
  display: block;
  margin: 15px auto;
  padding: 15px 25px;
  font-size: 1rem;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  background: linear-gradient(90deg, #00ffcc, #00aaff);
  color: black;
  font-weight: bold;
  transition: 0.3s;
  width: 80%;
  max-width: 400px;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px #00ffcc;
}

/* Links */
a {
  text-decoration: none;
}

/* Footer */
#abschluss {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 10px;
  font-size: 0.9rem;
  background: rgba(0,0,0,0.7);
  border-top: 1px solid #00ffcc;
}

/* Email */
#email {
  display: block;
  margin: 20px auto;
  color: #00ffcc;
}
</style>

</head>
