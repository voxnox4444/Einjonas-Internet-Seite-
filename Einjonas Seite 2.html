<!DOCTYPE html>

<head>

<title>EinJonas News</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #2c2c2c, #1a1a1a);
  color: white;
}

/* Header */
#überschrift {
  text-align: center;
  padding: 20px;
  margin: 0;
  font-size: 1.5rem;
  background: rgba(255,255,255,0.08);

}

/* Button */
a {
  display: flex;
  justify-content: center;
  margin-top: 20px;
  text-decoration: none;
}

button {
  padding: 12px 20px;
  font-size: 1rem;
  border: none;
  border-radius: 10px;

  transition: 0.3s;

button:hover {
  background: darkred;
  transform: scale(1.05);
}
#abschluss {
  position: fixed;
  bottom: 0;
  width: 100%;
  padding: 10px;
